<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ПРИКОЛЬЧИК</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Фон + анимированная сетка -->
    <div class="bg-layer">
        <div class="grid"></div>
    </div>

    <div class="container">
        <!-- Контент -->
        <div class="content" style="text-align:center; margin-top: 10vh;">
            <div class="neon-wrap" style="display:inline-block;">
                <div class="hardware-blocks" style="display:flex; justify-content:center; gap:2rem; margin-top:2rem; flex-wrap:wrap;">
                    <!-- Block 1 -->
                    <div class="block" style="background:rgba(0,0,0,0.4); padding:1.5rem; border-radius:8px; min-width:200px;">
                        <h2 style="color:var(--accent-color); margin-bottom:1rem;">PC</h2>
                        <ul style="text-align:left; color:#fff; line-height:1.6;">
                            <li>Motherboard ASRock B650M Pro RS</li>
                            <li>CPU AMD Ryzen 7 7700</li>
                            <li>GPU RX 6700 XT</li>
                            <li>G.Skill Ripjaws S5 DDR5 32GB</li>
                        </ul>
                    </div>
                    <!-- Block 2 -->
                    <div class="block" style="background:rgba(0,0,0,0.4); padding:1.5rem; border-radius:8px; min-width:200px;">
                        <h2 style="color:var(--accent-color); margin-bottom:1rem;">Периферия</h2>
                        <ul style="text-align:left; color:#fff; line-height:1.6;">
                            <li>Монитор Redmi G27Q 2025 2K IPS 180 Гц</li>
                            <li>Монитор AOC 24" 144 Гц</li>
                            <li>Мышь ZAOPIN Z2</li>
                            <li>Клавиатура Ardor Gaming</li>
                            <li>Микрофон Fifine K670</li>
                        </ul>
                    </div>
                </div>
            </div>
            <a href="index.html" class="header-btn" style="display:inline-block; margin-top:2rem;">Вернуться на главную</a>
        </div>
    </div>

    <script>
        // Simple IntersectionObserver to reveal elements on scroll (if needed)
        document.addEventListener('DOMContentLoaded', function () {
            const hiddenElements = document.querySelectorAll('.hidden');
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.remove('hidden');
                        entry.target.classList.add('show');
                    }
                });
            }, {
                threshold: 0.1
            });

            hiddenElements.forEach(el => observer.observe(el));
        });
    </script>
</body>
</html>
